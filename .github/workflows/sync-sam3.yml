name: Sync sam3 → HF
on:
  push:
    branches: [main]
    paths: ['sam3/**', '.github/workflows/sync-sam3.yml']

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gate — folder must be a superset of the Hub repo (guards --delete="*")
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: bash ./tools/verify-superset.sh sam3 uv-scripts/sam3

      - name: Guard — no LFS pointers (would corrupt Hub binaries)
        run: |
          if grep -rIl '^version https://git-lfs' sam3/; then
            echo "::error::LFS pointer file found in sam3/ — would upload pointer text and corrupt the Hub asset"
            exit 1
          fi

      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: uv-scripts/sam3
          repo_type: dataset          # required — action defaults to 'space'
          subdirectory: sam3
          hf_token: ${{ secrets.HF_TOKEN }}
