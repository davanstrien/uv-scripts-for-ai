name: Sync vlm-object-detection → HF
on:
  push:
    branches: [main]
    paths: ['vlm-object-detection/**', '.github/workflows/sync-vlm-object-detection.yml']

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gate — folder must be a superset of the Hub repo (guards --delete="*")
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: bash ./tools/verify-superset.sh vlm-object-detection uv-scripts/vlm-object-detection

      - name: Guard — no LFS pointers (would corrupt Hub binaries)
        run: |
          if grep -rIl '^version https://git-lfs' vlm-object-detection/; then
            echo "::error::LFS pointer file found in vlm-object-detection/ — would upload pointer text and corrupt the Hub asset"
            exit 1
          fi

      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: uv-scripts/vlm-object-detection
          repo_type: dataset          # required — action defaults to 'space'
          subdirectory: vlm-object-detection
          hf_token: ${{ secrets.HF_TOKEN }}
